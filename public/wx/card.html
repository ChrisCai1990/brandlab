<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信链接卡片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ededed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    }

    /* 模拟微信聊天气泡背景 */
    .chat-bg {
      width: 100%;
      max-width: 400px;
    }

    /* 链接卡片主体 */
    .link-card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .card-inner {
      display: flex;
      align-items: center;
      padding: 14px;
      gap: 12px;
    }

    .card-thumb {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #07c160, #00a854);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-text {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      line-height: 1.4;
      margin-bottom: 4px;
      /* 最多两行 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      border-top: 1px solid #f0f0f0;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .wechat-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .card-source {
      font-size: 12px;
      color: #b2b2b2;
    }

    /* 截图提示（打印时隐藏） */
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      line-height: 1.8;
    }

    .hint strong {
      color: #07c160;
      font-weight: 500;
    }

    @media print {
      .hint { display: none; }
      body { background: #ededed; }
    }
  </style>
</head>
<body>

<div class="chat-bg">
  <div class="link-card">
    <div class="card-inner">

      <!-- 左侧缩略图：换成你的头像或品牌图 -->
      <div class="card-thumb">
        <!-- 有图片时替换为: <img src="avatar.jpg" alt=""> -->
        🤝
      </div>

      <div class="card-text">
        <!-- 卡片标题：15字以内效果最佳 -->
        <div class="card-title">加我微信，了解更多详情</div>
        <!-- 卡片描述 -->
        <div class="card-desc">点击查看联系方式 · 备注抖音</div>
      </div>

    </div>

    <div class="card-footer">
      <!-- 微信 logo SVG -->
      <svg class="wechat-icon" viewBox="0 0 24 24" fill="none">
        <path d="M9.5 4C5.36 4 2 6.9 2 10.5c0 2.03 1.06 3.84 2.72 5.03L4 18l2.5-1.25c.96.27 1.97.41 3 .41.18 0 .36 0 .54-.01A5.98 5.98 0 0 1 10 16c0-3.31 2.69-6 6-6h.27C15.6 7.12 12.84 4 9.5 4z" fill="#07c160"/>
        <path d="M16 11c-2.76 0-5 1.79-5 4s2.24 4 5 4c.67 0 1.32-.1 1.92-.29L20 20l-.6-2.1A3.94 3.94 0 0 0 21 15c0-2.21-2.24-4-5-4z" fill="#07c160"/>
      </svg>
      <span class="card-source">微信联系方式</span>
    </div>
  </div>
</div>

<div class="hint">
  ↑ 截图保存后，发到抖音私信<br>
  修改内容：直接编辑此文件中<br>
  <strong>card-title</strong> 和 <strong>card-desc</strong> 两行文字
</div>

</body>
</html>
