<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>加刘院长微信</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #07c160 0%, #00a854 100%);
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .name {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .qr-wrap {
      background: #f9f9f9;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid #eee;
    }

    .qr-wrap img {
      width: 180px;
      height: 180px;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    .qr-placeholder {
      width: 180px;
      height: 180px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ddd;
      gap: 8px;
    }

    .qr-placeholder svg {
      opacity: 0.3;
    }

    .qr-placeholder span {
      font-size: 12px;
      color: #bbb;
    }

    .qr-hint {
      font-size: 12px;
      color: #07c160;
      margin-top: 10px;
      font-weight: 500;
    }

    .wechat-id-box {
      background: #f0faf4;
      border: 1px solid #b7e8c8;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wechat-id-label {
      font-size: 12px;
      color: #888;
    }

    .wechat-id-value {
      font-size: 16px;
      font-weight: 600;
      color: #07c160;
      letter-spacing: 1px;
    }

    .copy-btn {
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .copy-btn:active { opacity: 0.75; }
    .copy-btn.copied { background: #4caf50; }

    .notice {
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
      margin-top: 4px;
    }

    .notice em {
      font-style: normal;
      color: #07c160;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 22px 0;
    }

    .from-tag {
      font-size: 11px;
      color: #ccc;
      margin-top: 28px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="avatar">👋</div>
  <div class="name">刘院长</div>
  <div class="tagline">扫码添加微信<br>备注「抖音」优先通过</div>

  <div class="qr-wrap">
    <img src="/wx/qrcode.jpg" alt="刘院长微信二维码" style="width:180px;height:180px;display:block;margin:0 auto;border-radius:8px;">
    <div class="qr-hint">📸 截图后打开微信扫一扫</div>
  </div>

  <div class="notice">
    加我时请备注 <em>抖音</em>，方便我第一时间通过验证 🙏
  </div>

  <div class="divider"></div>

  <div class="notice">
    看到这个页面，说明你是通过抖音找到我的<br>
    期待和你深度连接 ✨
  </div>
</div>

<div class="from-tag">© 2024 · 请勿截图分享此页面</div>

<script>
  function copyId() {
    const id = document.getElementById('wechat-id').innerText;
    const btn = document.getElementById('copy-btn');

    if (navigator.clipboard) {
      navigator.clipboard.writeText(id).then(() => showCopied(btn));
    } else {
      // 兼容旧版浏览器
      const el = document.createElement('textarea');
      el.value = id;
      el.style.position = 'fixed';
      el.style.opacity = '0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      showCopied(btn);
    }
  }

  function showCopied(btn) {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 2000);
  }
</script>

</body>
</html>
